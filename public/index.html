<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Mon Blog API</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>🚀 Mon Blog</h1>

    <section class="form-section">
        <h2 id="formTitle">Ajouter un article</h2>
        <form id="articleForm">
            <!-- Champ caché pour stocker l'ID lors d'une modification -->
            <input type="hidden" id="articleId"> 
        
            <input type="text" id="titre" placeholder="Titre" required>
            <input type="text" id="auteur" placeholder="Auteur" required>
            <textarea id="contenu" placeholder="Contenu de l'article" required></textarea>
            <input type="text" id="categorie" placeholder="Catégorie">
            <button type="submit" id="submitBtn">Publier l'article</button>
            <button type="button" id="cancelBtn" style="display:none; background:gray;" onclick="resetForm()">Annuler la modification</button>
        </form>
    </section>

<!-- Reste du code (Recherche et Liste) inchangé -->
    <hr>

    <!-- Barre de recherche -->
    <section class="search-section">
        <input type="text" id="searchInput" placeholder="Rechercher un article...">
        <button type="button" onclick="searchArticles()">🔍 Rechercher</button>
    </section>

    <!-- Liste des articles -->
    <section>
        <h2>Articles récents</h2>
        <div id="articlesList">
            <!-- Les articles s'afficheront ici -->
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
